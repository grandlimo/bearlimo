<!-- admin/index.html -->
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BearLmousine Content Manager</title>
		<!-- Include the identity widget -->
		<script
			src="https://identity.netlify.com/v1/netlify-identity-widget.js"
			type="text/javascript"
		></script>
	</head>
	<body>
		<style>
			/* Sembunyikan tombol preview */
			[data-testid="preview-button"],
			.cms-preview-dropdown {
				display: none !important;
			}
		</style>
		<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

		<script>
			// Inject custom branding text into the login panel wrapper
			CMS.registerPreviewStyle(`
				/* Hide the default Decap icon graphic */
				.css-v3as49-IconWrapper svg, 
				[class*="IconWrapper"] svg {
					display: none !important;
				}

				/* Reset the wrapper background and box layout styles */
				.css-v3as49-IconWrapper, 
				[class*="IconWrapper"] {
					background: none !important;
					box-shadow: none !important;
					width: auto !important;
					height: auto !important;
					margin-bottom: 24px !important;
				}

				/* Inject your custom branding text string */
				.css-v3as49-IconWrapper::after, 
				[class*="IconWrapper"]::after {
					content: "BearLimo"
					font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
					font-size: 24px !important;
					font-weight: 700 !important;
					color: #2e353b !important; /* Clean dark grey color matching standard admin setups */
					letter-spacing: -0.5px !important;
					display: block !important;
					white-space: nowrap !important;
				}
			`);
		</script>
	</body>
</html>
